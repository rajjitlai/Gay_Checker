<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Gay? - The Ultimate Test</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Are you <span>GAY</span>?</h1>
            <div class="button-group">
                <button id="btn-yes" class="btn btn-primary">Yes 😂</button>
                <button id="btn-no" class="btn btn-secondary">No 😡</button>
            </div>
        </div>
    </main>

    <!-- Success Popup (Yes) -->
    <div id="popup-gay" class="popup">
        <div class="popup-content">
            <button class="close-btn" aria-label="Close">&times;</button>
            <img src="assets/images/gay.jpeg" alt="Gay meme">
            <h2>I knew it!</h2>
            <p>Thanks for saving the women for us! 😂😂😂</p>
        </div>
    </div>

    <!-- Impossible Popup (No) -->
    <div id="popup-straight" class="popup">
        <div class="popup-content">
            <button class="close-btn" aria-label="Close">&times;</button>
            <img src="assets/images/chad.jpg" alt="Gigachad">
            <h2>Impossible...</h2>
            <p>Welcome to the Straight Family! 🎉</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 | Refactored for Excellence</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
